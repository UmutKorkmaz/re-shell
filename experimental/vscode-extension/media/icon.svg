<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="100%" style="stop-color:#0288d1"/>
    </linearGradient>
    <linearGradient id="shell" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#80deea"/>
      <stop offset="100%" style="stop-color:#4fc3f7"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="20" ry="20" fill="url(#bg)"/>
  <!-- Outer border glow -->
  <rect x="4" y="4" width="120" height="120" rx="20" ry="20" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  <!-- Terminal prompt ">" -->
  <polyline points="30 58 48 44 30 30" fill="none" stroke="url(#shell)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Underscore cursor -->
  <line x1="52" y1="58" x2="72" y2="58" stroke="#4fc3f7" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <!-- "Re" text -->
  <text x="32" y="92" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="28" fill="#ffffff" letter-spacing="-1">Re</text>
  <!-- Shell text with accent -->
  <text x="60" y="92" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="28" fill="url(#accent)" letter-spacing="-1">Shell</text>
  <!-- Small dots representing project nodes -->
  <circle cx="88" cy="30" r="3" fill="#4fc3f7" opacity="0.7"/>
  <circle cx="100" cy="38" r="2.5" fill="#80deea" opacity="0.5"/>
  <circle cx="96" cy="26" r="2" fill="#b3e5fc" opacity="0.4"/>
</svg>
