name: Template Health Check

on:
  push:
    branches: [main]
    paths:
      - 'packages/cli/src/templates/**'
      - 'scripts/scaffold-test-templates.sh'
      - '.github/workflows/template-health.yml'
  pull_request:
    paths:
      - 'packages/cli/src/templates/**'
      - 'scripts/scaffold-test-templates.sh'

jobs:
  scaffold-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - name: Scaffold + typecheck representative templates
        run: bash scripts/scaffold-test-templates.sh
